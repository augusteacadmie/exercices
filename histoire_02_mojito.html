
<style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');*{box-sizing:border-box;margin:0;padding:0}</style>
<div style="font-family:'Montserrat',sans-serif;background:#fff;border-radius:16px;padding:2rem;min-height:360px">
  <p style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#aaff00;font-weight:700;margin-bottom:4px">Cuba · XVIe siècle</p>
  <h2 style="font-size:26px;font-weight:800;color:#111;margin-bottom:18px">Mojito</h2>
  <div style="display:flex;gap:2rem;align-items:center">
    <svg width="65" height="145" viewBox="0 0 65 145" style="flex-shrink:0">
      <path d="M6 12 L59 12 L54 136 L11 136 Z" fill="none" stroke="#ddd" stroke-width="2"/>
      <path d="M8 40 L57 40 L54 136 L11 136 Z" fill="#aaff00" opacity="0.13"/>
      <line x1="8" y1="40" x2="57" y2="40" stroke="#aaff00" stroke-width="1.5" opacity="0.6"/>
      <ellipse cx="20" cy="30" rx="11" ry="5" fill="#aaff00" opacity="0.75" transform="rotate(-25 20 30)"/>
      <ellipse cx="34" cy="26" rx="11" ry="5" fill="#77dd00" opacity="0.75" transform="rotate(10 34 26)"/>
      <ellipse cx="47" cy="32" rx="10" ry="4" fill="#aaff00" opacity="0.65" transform="rotate(22 47 32)"/>
      <path d="M6 44 Q12 33 22 41 Z" fill="#ffff66" stroke="#bbbb00" stroke-width="1" opacity="0.9"/>
      <rect x="55" y="5" width="5" height="132" rx="2.5" fill="#ff00aa" opacity="0.65"/>
      <rect x="16" y="65" width="17" height="17" rx="4" fill="white" stroke="#c0daf0" stroke-width="1.5" opacity="0.9"/>
      <rect x="35" y="58" width="15" height="15" rx="4" fill="white" stroke="#c0daf0" stroke-width="1.5" opacity="0.9"/>
      <rect x="18" y="92" width="18" height="16" rx="4" fill="white" stroke="#c0daf0" stroke-width="1.5" opacity="0.9"/>
    </svg>
    <div style="flex:1;display:flex;flex-direction:column;gap:0">
      <div id="mpanel" style="background:#f5fff0;border-left:4px solid #aaff00;padding:14px 16px;border-radius:0 12px 12px 0;margin-bottom:16px;min-height:96px">
        <p style="font-size:13px;font-weight:700;color:#111;margin-bottom:6px" id="mt">Les pirates de Francis Drake</p>
        <p style="font-size:12px;color:#555;line-height:1.75" id="mb">Au XVIe siècle, les marins anglais préparaient une décoction d'<em>aguardiente</em>, de menthe sauvage, de citron vert et de sucre de canne contre le scorbut. Le Mojito descend directement de cette recette de survie.</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <button onclick="mp(0)" id="mb0" style="padding:9px 14px;border-radius:10px;border:2px solid #aaff00;background:#aaff00;color:#1a1a1a;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left">🌿 Menthe · Hierbabuena cubaine</button>
        <button onclick="mp(1)" id="mb1" style="padding:9px 14px;border-radius:10px;border:2px solid #eee;background:#fff;color:#bbb;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left">🍋 Citron vert · L'acidité vitale</button>
        <button onclick="mp(2)" id="mb2" style="padding:9px 14px;border-radius:10px;border:2px solid #eee;background:#fff;color:#bbb;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left">🥃 Rhum blanc · L'âme de Cuba</button>
        <button onclick="mp(3)" id="mb3" style="padding:9px 14px;border-radius:10px;border:2px solid #eee;background:#fff;color:#bbb;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left">🫧 Eau gazeuse · La légèreté</button>
      </div>
    </div>
  </div>
</div>
<script>
const md=[
  {t:'Les pirates de Francis Drake',b:'Au XVIe siècle, les marins anglais préparaient une décoction d\'<em>aguardiente</em>, de menthe sauvage, de citron vert et de sucre de canne contre le scorbut. Le Mojito descend directement de cette recette de survie.'},
  {t:'Menthe · Hierbabuena cubaine',b:'À Cuba, la <em>hierbabuena</em> — menthe sauvage locale — est plus poivrée et aromatique que la menthe classique. Elle est la signature qui distingue un vrai Mojito cubain de toutes ses imitations mondiales.'},
  {t:'Citron vert · L\'acidité vitale',b:'Le jus de citron vert frais est non négociable. Il active les arômes de la menthe et équilibre le sucre. Un Mojito au jus industriel ou au citron jaune n\'est pas un Mojito — c\'est une erreur.'},
  {t:'Rhum blanc · L\'âme de Cuba',b:'<strong>Bacardí</strong> était le rhum historique, distillé à Santiago depuis 1862. Aujourd\'hui, <strong>Havana Club</strong> est la référence. Le rhum blanc léger laisse s\'exprimer la menthe et le citron sans les écraser.'},
  {t:'Eau gazeuse · La légèreté finale',b:'La soda water s\'ajoute en dernier, sans agiter. Elle allonge, apporte la fraîcheur et conserve les bulles. Une agitation après l\'ajout de soda est la faute technique la plus commune derrière un comptoir.'}
];
function mp(n){
  document.querySelectorAll('[id^="mb"]').forEach((b,i)=>{b.style.background=i===n?'#aaff00':'#fff';b.style.color=i===n?'#1a1a1a':'#bbb';b.style.borderColor=i===n?'#aaff00':'#eee';});
  document.getElementById('mt').textContent=md[n].t;
  document.getElementById('mb').innerHTML=md[n].b;
}
</script>
