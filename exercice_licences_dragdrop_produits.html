<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercice – Licences et boissons</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:#f4f4f2;min-height:100vh;padding:20px 14px;color:#1a1a1a;}

:root{--navy:#1a1d56;--gold:#b28221;--navy-l:#e8e9f5;--gold-l:#faf3e0;}

h1{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:3px;}
.subtitle{font-size:11px;color:#666;margin-bottom:16px;font-weight:500;}

.scorebar{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:10px;padding:10px 16px;margin-bottom:16px;border:1.5px solid #E8E8E8;}
.score-label{font-size:11px;color:#777;font-weight:600;}
.score-val{font-size:15px;font-weight:800;color:var(--navy);}

/* CARDS POOL */
.pool-title{font-size:10px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.cards-pool{display:flex;flex-wrap:wrap;gap:10px;min-height:72px;background:#fff;border-radius:12px;border:2px dashed #D0D0D0;padding:12px;margin-bottom:20px;}

/* BOISSON CARD */
.bcard{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:10px 12px;border-radius:10px;
  background:#fff;border:2px solid var(--navy);
  cursor:grab;user-select:none;
  transition:opacity .15s,transform .15s,border-color .15s;
  width:100px;flex-shrink:0;
}
.bcard:active{cursor:grabbing;opacity:.6;transform:scale(.95);}
.bcard.dragging{opacity:.35;}
.bcard-icon{font-size:28px;line-height:1;}
.bcard-name{font-size:10px;font-weight:700;color:var(--navy);text-align:center;line-height:1.3;}
.bcard.placed{opacity:.3;pointer-events:none;border-style:dashed;}
.bcard.correct{border-color:#2E7D32;background:#E8F5E9;}
.bcard.correct .bcard-name{color:#1B5E20;}
.bcard.wrong{border-color:#C62828;background:#FDECEA;}
.bcard.wrong .bcard-name{color:#7B1C1C;}

/* ZONES GRID */
.zones-wrap{display:flex;flex-direction:column;gap:12px;}
.zone{border-radius:12px;border:2px solid var(--navy);background:#fff;overflow:hidden;}
.zone-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--navy);}
.zone-badge{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.zone-info{}
.zone-title{font-size:12px;font-weight:800;color:#fff;}
.zone-sub{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px;}
.zone-body{
  min-height:70px;display:flex;flex-wrap:wrap;gap:8px;padding:12px;
  background:var(--navy-l);
  transition:background .15s;
}
.zone-body.drag-over{background:#d4d6ee;outline:2px dashed var(--navy);outline-offset:-2px;}

/* BTN */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
.btn{padding:11px 22px;border-radius:10px;border:none;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-check{background:var(--navy);color:#fff;}
.btn-check:hover{background:#13164a;}
.btn-retry{background:var(--gold-l);color:var(--gold);border:2px solid var(--gold);}
.btn-retry:hover{background:#f0e8cc;}

/* FEEDBACK */
.feedback{display:none;margin-top:16px;border-radius:12px;padding:16px 18px;border:2px solid;}
.feedback.show{display:block;}
.feedback.ok{background:#E8F5E9;border-color:#2E7D32;}
.feedback.ko{background:#FFF8E1;border-color:var(--gold);}
.fb-title{font-size:13px;font-weight:800;margin-bottom:8px;}
.feedback.ok .fb-title{color:#1B5E20;}
.feedback.ko .fb-title{color:#7a5c00;}
.fb-item{font-size:11px;line-height:1.7;color:#444;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.fb-item:last-child{border:none;}
.fb-item strong{color:var(--navy);}

/* RÉSULTAT FINAL */
.result-wrap{text-align:center;padding:24px 0;}
.result-emoji{font-size:52px;margin-bottom:10px;}
.result-score{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:6px;}
.result-msg{font-size:13px;color:#555;line-height:1.7;margin-bottom:20px;}
</style>
</head>
<body>

<h1>Exercice — Licences et boissons</h1>
<p class="subtitle">Glissez chaque boisson vers la licence minimale requise pour la servir légalement</p>

<div class="scorebar">
  <span class="score-label">Score</span>
  <span class="score-val" id="scoreVal">— / 10</span>
</div>

<div class="pool-title">Boissons à classer — glissez chaque carte vers la bonne licence</div>
<div class="cards-pool" id="pool"
  ondragover="event.preventDefault()"
  ondrop="returnToPool(event)">
</div>

<div class="zones-wrap" id="zonesWrap"></div>

<div class="btn-row">
  <button class="btn btn-check" onclick="checkAnswers()">Vérifier mes réponses</button>
  <button class="btn btn-retry" onclick="resetExercise()">Recommencer</button>
</div>

<div class="feedback" id="feedback">
  <div class="fb-title" id="fbTitle"></div>
  <div id="fbBody"></div>
</div>

<script>
var BOISSONS = [
  {id:'b1', icon:'🍵', name:'Infusion menthe', licence:'I',    expl:'Sans alcool — groupe 1, aucune licence requise.'},
  {id:'b2', icon:'🍺', name:'Bière blonde',    licence:'II',   expl:'Boisson fermentée groupe 2 — licence II minimum.'},
  {id:'b3', icon:'🍷', name:'Vin rouge',       licence:'II',   expl:'Vin fermenté groupe 2 — licence II minimum.'},
  {id:'b4', icon:'🍊', name:'Jus d\'orange',   licence:'I',    expl:'Boisson sans alcool groupe 1 — aucune licence.'},
  {id:'b5', icon:'🥂', name:'Champagne',       licence:'II',   expl:'Vin effervescent groupe 2 — licence II minimum.'},
  {id:'b6', icon:'🍸', name:'Dry Martini',     licence:'IV',   expl:'Cocktail à base de gin et vermouth — spiritueux groupe 5, licence IV.'},
  {id:'b7', icon:'🥃', name:'Whisky',          licence:'IV',   expl:'Spiritueux distillé groupe 5 — licence IV obligatoire.'},
  {id:'b8', icon:'🍹', name:'Mojito',          licence:'IV',   expl:'Rhum groupe 4/5 — licence IV obligatoire.'},
  {id:'b9', icon:'🍾', name:'Pineau des Charentes', licence:'III', expl:'Vin de liqueur groupe 3 — licence III minimum.'},
  {id:'b10',icon:'🫖', name:'Cidre brut',      licence:'II',   expl:'Boisson fermentée groupe 2 — licence II minimum.'},
];

var ZONES = [
  {id:'I',   badge:'I',   title:'Licence I — Sans alcool',         sub:'Groupe 1 uniquement · Aucun permis requis'},
  {id:'II',  badge:'II',  title:'Licence II — Petite licence',      sub:'Groupes 1 et 2 · Bières, vins, cidres'},
  {id:'III', badge:'III', title:'Licence III — Licence restreinte', sub:'Groupes 1, 2 et 3 · + ABV, vins de liqueur'},
  {id:'IV',  badge:'IV',  title:'Licence IV — Grande licence',      sub:'Groupes 1 à 5 · Tous les spiritueux'},
];

var placed = {};
var dragging = null;
var checked = false;

function buildZones() {
  var wrap = document.getElementById('zonesWrap');
  wrap.innerHTML = '';
  ZONES.forEach(function(z) {
    var div = document.createElement('div');
    div.className = 'zone';
    div.innerHTML =
      '<div class="zone-header">' +
      '<div class="zone-badge">'+z.badge+'</div>' +
      '<div class="zone-info"><div class="zone-title">'+z.title+'</div><div class="zone-sub">'+z.sub+'</div></div>' +
      '</div>' +
      '<div class="zone-body" id="zb-'+z.id+'"' +
      ' ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,\''+z.id+'\')">' +
      '</div>';
    wrap.appendChild(div);
  });
}

function buildPool() {
  var pool = document.getElementById('pool');
  pool.innerHTML = '';
  placed = {};
  checked = false;
  document.getElementById('scoreVal').textContent = '— / 10';
  document.getElementById('feedback').className = 'feedback';

  var shuffled = BOISSONS.slice().sort(function(){ return Math.random()-.5; });
  shuffled.forEach(function(b) {
    pool.appendChild(makeCard(b));
  });

  ZONES.forEach(function(z){
    document.getElementById('zb-'+z.id).innerHTML = '';
  });
}

function makeCard(b) {
  var el = document.createElement('div');
  el.className = 'bcard';
  el.id = 'bc-'+b.id;
  el.draggable = true;
  el.innerHTML = '<div class="bcard-icon">'+b.icon+'</div><div class="bcard-name">'+b.name+'</div>';
  el.ondragstart = function(e) {
    dragging = b;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(function(){ el.classList.add('dragging'); }, 0);
  };
  el.ondragend = function(){ el.classList.remove('dragging'); };

  el.addEventListener('touchstart', function(e){ startTouch(e, b, el); }, {passive:false});
  el.addEventListener('touchmove', onTouchMove, {passive:false});
  el.addEventListener('touchend', function(e){ endTouch(e, b); });

  return el;
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, zoneId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragging || checked) return;
  placeCard(dragging, zoneId);
  dragging = null;
}
function returnToPool(e) {
  e.preventDefault();
}

function placeCard(b, zoneId) {
  var oldZone = placed[b.id];
  if(oldZone) {
    var oldEl = document.getElementById('bc-'+b.id);
    if(oldEl) oldEl.remove();
  } else {
    var poolEl = document.getElementById('bc-'+b.id);
    if(poolEl) poolEl.remove();
  }
  placed[b.id] = zoneId;
  var el = makeCard(b);
  document.getElementById('zb-'+zoneId).appendChild(el);
}

function checkAnswers() {
  var total = BOISSONS.length;
  var placedCount = Object.keys(placed).length;
  if(placedCount < total) {
    showAlert('Placez toutes les boissons avant de vérifier.');
    return;
  }
  checked = true;
  var ok = 0;
  var errors = [];
  var zoneLabels = {I:'Licence I',II:'Licence II',III:'Licence III',IV:'Licence IV'};

  BOISSONS.forEach(function(b) {
    var el = document.getElementById('bc-'+b.id);
    var correct = placed[b.id] === b.licence;
    if(correct) {
      ok++;
      if(el) el.classList.add('correct');
    } else {
      if(el) el.classList.add('wrong');
      errors.push({b:b, given:placed[b.id]});
    }
  });

  document.getElementById('scoreVal').textContent = ok + ' / ' + total;

  var fb = document.getElementById('feedback');
  var fbTitle = document.getElementById('fbTitle');
  var fbBody = document.getElementById('fbBody');
  fbBody.innerHTML = '';

  if(ok === total) {
    fb.className = 'feedback show ok';
    fbTitle.textContent = 'Parfait — toutes les boissons sont correctement classées.';
    var item = document.createElement('div');
    item.className = 'fb-item';
    item.textContent = 'Vous maîtrisez les groupes de boissons et les licences correspondantes. Chaque décision de service repose sur cette connaissance.';
    fbBody.appendChild(item);
  } else {
    fb.className = 'feedback show ko';
    fbTitle.textContent = ok + ' / ' + total + ' — quelques corrections à apporter :';
    errors.forEach(function(err) {
      var item = document.createElement('div');
      item.className = 'fb-item';
      item.innerHTML = '<strong>'+err.b.icon+' '+err.b.name+'</strong> — Placé en '+zoneLabels[err.given]+'. Bonne réponse : '+zoneLabels[err.b.licence]+'. '+err.b.expl;
      fbBody.appendChild(item);
    });
  }
}

function resetExercise() {
  buildPool();
}

/* TOUCH DRAG */
var touchCard = null;
var touchEl = null;
var ghost = null;

function startTouch(e, b, el) {
  touchCard = b;
  touchEl = el;
  var touch = e.touches[0];
  ghost = el.cloneNode(true);
  ghost.style.cssText = 'position:fixed;opacity:.7;pointer-events:none;z-index:999;width:'+el.offsetWidth+'px;top:'+(touch.clientY-el.offsetHeight/2)+'px;left:'+(touch.clientX-el.offsetWidth/2)+'px;';
  document.body.appendChild(ghost);
  e.preventDefault();
}

function onTouchMove(e) {
  if(!ghost) return;
  var touch = e.touches[0];
  ghost.style.top = (touch.clientY - ghost.offsetHeight/2)+'px';
  ghost.style.left = (touch.clientX - ghost.offsetWidth/2)+'px';
  e.preventDefault();
}

function endTouch(e, b) {
  if(ghost){ ghost.remove(); ghost = null; }
  if(!touchCard || checked) return;
  var touch = e.changedTouches[0];
  var el2 = document.elementFromPoint(touch.clientX, touch.clientY);
  var zoneBody = el2 ? el2.closest('.zone-body') : null;
  if(zoneBody) {
    var zid = zoneBody.id.replace('zb-','');
    placeCard(touchCard, zid);
  }
  touchCard = null; touchEl = null;
}

function showAlert(msg) {
  var a = document.createElement('div');
  a.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a1d56;color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:700;z-index:9999;font-family:Montserrat,sans-serif;';
  a.textContent=msg;
  document.body.appendChild(a);
  setTimeout(function(){a.remove();},2000);
}

buildZones();
buildPool();
</script>
</body>
</html>
