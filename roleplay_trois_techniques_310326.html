
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.opt{width:100%;text-align:left;padding:12px 16px;border-radius:10px;border:2px solid #eee;background:#fff;font-size:12px;color:#333;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .15s;line-height:1.55}
.opt:hover:not(:disabled){border-color:#aa00ff;background:#f8f0ff}
.opt.correct{border-color:#44bb00;background:#f0ffe8;color:#226600}
.opt.wrong{border-color:#ff4455;background:#fff0f2;color:#cc1122}
.opt.missed{border-color:#44bb00;background:#f0ffe8;color:#226600;opacity:.6}
.opt:disabled{cursor:default}
.bubble{background:#f5f5f5;border-radius:0 14px 14px 14px;padding:12px 15px;font-size:13px;color:#222;line-height:1.7;position:relative}
.bubble::before{content:'';position:absolute;top:0;left:-10px;border-top:10px solid #f5f5f5;border-left:10px solid transparent}
.lvlbtn{padding:9px 20px;border-radius:20px;border:2px solid #eee;background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;color:#bbb;transition:all .2s}
.pdot{width:9px;height:9px;border-radius:50%;background:#eee;transition:all .3s;display:inline-block}
.tech-badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:4px 10px;border-radius:20px;display:inline-block}
.av{width:44px;height:44px;border-radius:50%;object-fit:cover;object-position:center top;flex-shrink:0;border:2px solid #eee}
.av-sm{width:28px;height:28px;border-radius:50%;object-fit:cover;object-position:center top;flex-shrink:0;border:2px solid white}
.av-grp{display:flex}
.av-grp .av-sm:not(:first-child){margin-left:-7px}
</style>

<div style="font-family:'Montserrat',sans-serif;background:#fff;border-radius:16px;padding:2rem">

  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
    <div>
      <p style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#aa00ff;font-weight:700;margin-bottom:4px">Exercice · Techniques de vente</p>
      <h2 style="font-size:20px;font-weight:800;color:#111;line-height:1.25">Suggestion · Upselling · Cross-selling</h2>
    </div>
    <div style="text-align:right">
      <p style="font-size:10px;color:#bbb;font-weight:700;margin-bottom:4px">SCORE</p>
      <p style="font-size:22px;font-weight:800;color:#111" id="sc">0 / 0</p>
    </div>
  </div>
  <p style="font-size:12px;color:#bbb;font-weight:600;margin-bottom:18px">Choisissez la meilleure réponse pour chaque situation client.</p>

  <div style="display:flex;gap:8px;margin-bottom:20px">
    <button class="lvlbtn" id="lb0" onclick="setLv(0)">🟢 Facile</button>
    <button class="lvlbtn" id="lb1" onclick="setLv(1)">🟡 Moyen</button>
    <button class="lvlbtn" id="lb2" onclick="setLv(2)">🔴 Difficile</button>
  </div>

  <div style="display:flex;gap:7px;align-items:center;margin-bottom:20px" id="dots"></div>

  <div id="card">
    <!-- Context -->
    <div style="display:flex;align-items:center;gap:10px;background:#fafafa;border-radius:10px;padding:10px 14px;margin-bottom:14px">
      <span id="cxi" style="font-size:15px">🍸</span>
      <div style="flex:1">
        <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#bbb;margin-bottom:2px">Contexte</p>
        <p style="font-size:12px;font-weight:700;color:#333" id="cxt">—</p>
      </div>
      <span class="tech-badge" id="tbadge">—</span>
    </div>

    <!-- Client -->
    <div style="margin-bottom:16px">
      <div style="display:flex;align-items:flex-end;gap:10px">
        <div id="avwrap" style="flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <p style="font-size:10px;color:#bbb;font-weight:700;margin-bottom:5px" id="cname">—</p>
          <div class="bubble" id="csays">—</div>
        </div>
      </div>
    </div>

    <!-- Question -->
    <div style="border-left:4px solid #aa00ff;background:#f8f0ff;padding:11px 14px;border-radius:0 10px 10px 0;margin-bottom:14px">
      <p style="font-size:12px;color:#7700cc;font-weight:700" id="qtext">Quelle est votre réponse ?</p>
    </div>

    <!-- Options -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px" id="opts"></div>

    <!-- Feedback -->
    <div id="fb" style="display:none;border-radius:12px;padding:14px 16px;margin-bottom:14px">
      <p style="font-size:13px;font-weight:800;margin-bottom:6px" id="fbt"></p>
      <p style="font-size:12px;line-height:1.75" id="fbb"></p>
      <div id="ideal_wrap" style="display:none;margin-top:10px;background:rgba(255,255,255,.6);border-radius:8px;padding:10px 13px">
        <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#aa00ff;margin-bottom:5px">Formulation idéale</p>
        <p style="font-size:12px;color:#333;font-style:italic;line-height:1.65" id="ideal_text"></p>
      </div>
    </div>

    <!-- Nav -->
    <div style="display:flex;justify-content:space-between;align-items:center">
      <p style="font-size:11px;color:#bbb;font-weight:700" id="qc">Q 1/3</p>
      <button id="nxt" onclick="nextQ()" style="display:none;padding:10px 22px;border-radius:20px;border:none;background:#aa00ff;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif">Suivant →</button>
    </div>
  </div>

  <!-- Results -->
  <div id="res" style="display:none;text-align:center;padding:1rem 0">
    <div style="font-size:48px;margin-bottom:12px" id="re">🏆</div>
    <p style="font-size:22px;font-weight:800;color:#111;margin-bottom:6px" id="rt">—</p>
    <p style="font-size:32px;font-weight:800;margin-bottom:8px" id="rscore">—</p>
    <p style="font-size:13px;color:#555;line-height:1.7;max-width:480px;margin:0 auto 20px" id="rm"></p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button onclick="restart()" style="padding:11px 24px;border-radius:20px;border:2px solid #aa00ff;background:#fff;color:#aa00ff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🔄 Recommencer</button>
      <button id="nlb" onclick="nextLv()" style="padding:11px 24px;border-radius:20px;border:none;background:#aa00ff;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Niveau suivant →</button>
    </div>
  </div>
</div>

<script>

function mkAv(k){
  if(!Array.isArray(k))k=[k];
  if(k.length===1)return`<img src="${PH[k[0]]}" class="av">`;
  return`<div class="av-grp">${k.map((n,i)=>`<img src="${PH[n]}" class="av-sm" style="z-index:${k.length-i}">`).join('')}</div>`;
}

const TECH={
  s:{label:'Suggestion',bg:'#f0ffe8',col:'#44bb00'},
  u:{label:'Upselling',bg:'#fff8f0',col:'#ff7700'},
  c:{label:'Cross-selling',bg:'#f8f0ff',col:'#aa00ff'}

const LV=[
  // FACILE
  {color:'#aaff00',tc:'#1a1a1a',label:'Facile',qs:[
    {phs:'sophie',name:'Sophie · comptoir',ctx:'Service du soir · Comptoir · Hésitation visible',cxi:'🍸',tech:'s',
     qtext:'Sophie pose la carte et lève les yeux vers vous. Que faites-vous ?',

     opts:[
       {t:'« Voici la carte, prenez le temps de regarder. »',ok:false,

       {t:'« Dans ce cas je vous suggère notre cocktail signature — gin, concombre, eau tonique. Très frais, très léger. Ça vous tente ? »',ok:true,
        w:''},
       {t:'« Vous voulez un Mojito ? »',ok:false,
        w:'Proposer une seule option fermée sans argument ni lien avec ce qu\'elle a exprimé (frais, hésitation) est trop réducteur. Aucun bénéfice client dans la formulation.'}
     ],
     fc:'Signal vert capté, proposition précise avec profil gustatif, question ouverte finale. La suggestion parfaite.',
     fw:'Quand un client exprime une envie vague, c\'est une invitation à proposer — pas à attendre.',
     ideal:'« Dans ce cas je vous suggère notre cocktail signature — gin, concombre, eau tonique. Très frais, très léger. Ça vous tente ? »'},
    {phs:'thomas',name:'Thomas · table 3',ctx:'Service du midi · Table · Commande ouverte',cxi:'🥃',tech:'u',
     qtext:'Thomas commande un whisky sans préciser la marque. Comment répondez-vous ?',
     says:'Je vais prendre un whisky, s\'il vous plaît.',
     opts:[
       {t:'« Un whisky, parfait — je vous apporte ça. »',ok:false,
        w:'Vous avez laissé passer la fenêtre d\'upselling. Sans précision, le barman servira le moins cher. Le client mérite un choix éclairé.'},
       {t:'« Vous avez une préférence sur le style — quelque chose de rond et accessible, ou vous aimez les whiskies plus tourbés ? »',ok:true,
        w:''},
       {t:'« Je vous conseille vraiment notre meilleur whisky, c\'est exceptionnel. »',ok:false,
        w:'"Je vous conseille vraiment" est trop directif et "exceptionnel" sans argument précis manque de crédibilité. L\'upselling doit reposer sur une caractéristique réelle, pas sur une superlative.'}
     ],
     fc:'La question ouvre le profil du client, vous donne les informations pour proposer la bonne référence, et crée l\'espace naturel pour l\'upselling.',
     fw:'Une catégorie nommée sans marque est toujours une fenêtre d\'upselling. Ne la laissez pas passer.',
     ideal:'« Vous avez une préférence sur le style — quelque chose de rond et accessible, ou vous aimez les whiskies plus tourbés ? »'},
    {phs:'marc',name:'Marc · table 6',ctx:'Service du déjeuner · Table · Commande confirmée',cxi:'🥂',tech:'c',
     qtext:'Marc vient de commander un verre de Chablis. Vous confirmez et...',
     says:'Un verre de Chablis, s\'il vous plaît.',
     opts:[
       {t:'« Très bien — un Chablis. »',ok:false,
        w:'La commande est confirmée, mais vous n\'avez pas saisi l\'opportunité naturelle du cross-selling. La fenêtre était ouverte.'},
       {t:'« Très bien — un Chablis. Et si vous souhaitez quelque chose pour accompagner, nos huîtres du jour vont très bien avec. »',ok:true,
        w:''},
       {t:'« Très bien — et vous voulez aussi une bouteille pour la table ? »',ok:false,
        w:'Passer directement à une bouteille sans avoir capté de signal d\'intention dans ce sens est trop agressif. Le cross-selling doit proposer une cohérence, pas une multiplication.'}
     ],
     fc:'La suggestion d\'accord mets-boisson est naturelle, logique, et non intrusive. C\'est du cross-selling par cohérence, pas par accumulation.',
     fw:'Le cross-selling arrive après la confirmation de la commande principale. Il propose un complément logique — jamais une surenchère.',
     ideal:'« Très bien — un Chablis. Et si vous souhaitez quelque chose pour accompagner, nos huîtres du jour vont très bien avec. »'}

  // MOYEN
  {color:'#ffaa00',tc:'white',label:'Moyen',qs:[

     fc:'La suggestion capitalise sur le contexte de l\'occasion. Elle propose un produit cohérent avec l\'événement ET elle crée une expérience, pas juste une vente.',

     ideal:'« Félicitations ! Dans ce cas, je vous suggère de commencer par une coupe de Champagne — nous avons un Blanc de Blancs très élégant, et ça pose vraiment le ton d\'une belle soirée. »'},

     opts:[

        w:'Vous capitulezimmédiatement sans avoir défendu la valeur. Une objection prix n\'est pas un refus — c\'est une demande de justification. Vous avez abandonné l\'upselling trop tôt.'},
       {t:'« Je comprends — la différence avec le Hendrick\'s, c\'est son infusion à la rose et au concombre qui lui donne un profil vraiment unique. Ce 2€ de plus, vous le sentez vraiment dans le verre. Mais si vous préférez le classique, je le fais avec plaisir aussi. »',ok:true,

     ],
     fc:'L\'argument précis (infusion, profil gustatif) justifie l\'écart. La liberté de choix est rendue au client en fin de phrase. L\'upselling éthique s\'arrête après l\'argument — jamais après l\'insistance.',

     ideal:'« La différence avec le Hendrick\'s, c\'est son infusion à la rose et au concombre. Ce 2€ de plus, vous le sentez vraiment dans le verre. Mais si vous préférez le classique, je le fais avec plaisir aussi. »'},

     fc:'La proposition est cohérente avec le moment (fin de repas), le produit est nommé et argumenté, et la logique de pairing crédibilise la suggestion sans la rendre commerciale.',

     qtext:'Lucas s\'installe au comptoir. Il commande : "Un Negroni — mais je veux quelque chose d\'un peu moins classique si vous avez." C\'est un client expert qui vous tend une perche. Comment conduisez-vous l\'upselling ?',

let lv=0,q=0,score=0,total=0,done=false;

function setLv(n){
  lv=n;q=0;done=false;
  document.getElementById('res').style.display='none';
  document.getElementById('card').style.display='block';
  [0,1,2].forEach(i=>{
    const b=document.getElementById('lb'+i);
    const c=LV[i].color;
    if(i===n){b.style.background=c;b.style.color=LV[i].tc;b.style.borderColor=c;}
    else{b.style.background='#fff';b.style.color='#bbb';b.style.borderColor='#eee';}
  });
  renderQ();
}

function renderQ(){
  done=false;
  const d=LV[lv].qs[q];
  const t=TECH[d.tech];
  document.getElementById('qc').textContent='Question '+(q+1)+' / '+LV[lv].qs.length;
  document.getElementById('cxi').textContent=d.cxi;
  document.getElementById('cxt').textContent=d.ctx;
  document.getElementById('cname').textContent=d.name;
  document.getElementById('csays').textContent=d.says;
  document.getElementById('qtext').textContent=d.qtext;
  document.getElementById('avwrap').innerHTML=mkAv(d.phs);
  const tb=document.getElementById('tbadge');
  tb.textContent=t.label;tb.style.background=t.bg;tb.style.color=t.col;
  document.getElementById('fb').style.display='none';
  document.getElementById('nxt').style.display='none';
  const wrap=document.getElementById('opts');
  wrap.innerHTML='';
  d.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';b.textContent=o.t;
    b.onclick=()=>pick(i);
    wrap.appendChild(b);
  });
  renderDots();updateSc();
}

function pick(i){
  if(done)return;
  done=true;
  const d=LV[lv].qs[q];
  document.querySelectorAll('.opt').forEach((b,j)=>{
    b.disabled=true;
    if(d.opts[j].ok)b.classList.add('correct');
    else if(j===i&&!d.opts[i].ok)b.classList.add('wrong');
  });
  const ok=d.opts[i].ok;
  if(ok)score++;total++;
  const fb=document.getElementById('fb');
  const iw=document.getElementById('ideal_wrap');
  fb.style.cssText=ok
    ?'display:block;background:#f0ffe8;border-left:4px solid #44bb00;border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:14px'
    :'display:block;background:#fff0f2;border-left:4px solid #ff4455;border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:14px';
  document.getElementById('fbt').style.color=ok?'#226600':'#cc1122';
  document.getElementById('fbt').textContent=ok?'✓ Bonne technique':'✗ Pas tout à fait';
  document.getElementById('fbb').style.color=ok?'#335500':'#661122';
  document.getElementById('fbb').textContent=ok?d.fc:(d.opts[i].w?d.opts[i].w+' — ':'')+d.fw;
  if(!ok&&d.ideal){
    iw.style.display='block';
    document.getElementById('ideal_text').textContent=d.ideal;
  } else {iw.style.display='none';}
  updateSc();renderDots();
  const nb=document.getElementById('nxt');
  nb.style.display='block';
  nb.textContent=q===LV[lv].qs.length-1?'Voir les résultats →':'Suivant →';
}

function nextQ(){
  if(q<LV[lv].qs.length-1){q++;renderQ();}
  else showRes();
}

function renderDots(){
  const wrap=document.getElementById('dots');wrap.innerHTML='';
  LV[lv].qs.forEach((_,i)=>{
    const d=document.createElement('span');d.className='pdot';
    if(i<q)d.style.background='#aa00ff';
    else if(i===q)d.style.background=LV[lv].color;
    wrap.appendChild(d);
  });
  const l=document.createElement('span');
  l.style.cssText='font-size:11px;color:#bbb;font-weight:700;margin-left:6px';
  l.textContent='Niveau '+LV[lv].label;
  wrap.appendChild(l);
}

function updateSc(){document.getElementById('sc').textContent=score+' / '+total;}

function showRes(){
  document.getElementById('card').style.display='none';
  document.getElementById('res').style.display='block';
  const t=LV[lv].qs.length;
  const lvs=score-(total-t);
  const pct=Math.round(lvs/t*100);
  let e,ti,m;
  if(pct===100){e='🏆';ti='Technique maîtrisée';m='Vous identifiez la bonne technique au bon moment et vous la formulez avec précision. C\'est exactement ce qu\'un service actif de qualité requiert.';}
  else if(pct>=66){e='👍';ti='Bonne lecture';m='Vous identifiez bien les situations mais certaines formulations peuvent encore gagner en précision ou en naturel. Relisez les feedbacks pour affiner.';}
  else{e='📋';ti='À travailler';m='Les techniques sont là dans le principe, mais leur application demande plus d\'ancrage. Recommencez en prenant le temps de lire chaque option avant de répondre.';}
  document.getElementById('re').textContent=e;
  document.getElementById('rt').textContent=ti;
  document.getElementById('rm').textContent=m;
  document.getElementById('rscore').textContent=lvs+' / '+t;
  document.getElementById('rscore').style.color=LV[lv].color==='#aaff00'?'#44bb00':LV[lv].color;
  document.getElementById('nlb').style.display=lv===2?'none':'block';
}

function restart(){
  const t=LV[lv].qs.length;
  score=Math.max(0,score-t);total=Math.max(0,total-t);
  setLv(lv);
}
function nextLv(){if(lv<2)setLv(lv+1);}
setLv(0);
</script>
